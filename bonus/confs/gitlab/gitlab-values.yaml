# __________________GitLab Minimal Configuration for Low Resources
# __________________Optimized for local development with ArgoCD integration


global:
  # __________________Host configuration
  hosts:
    domain: local
    https: false
    gitlab:
      name: gitlab.local
    kas:
      name: kas.local
    minio:
      name: minio.local

  edition: ce
  
  # __________________Ingress configuration, most usefull for gitlab applications deploy by Helm.
  # __________________Gitlab web service default will be correctly ingress after by gitlab-ingress.yaml
  ingress:
    enabled: true
    class: traefik
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: web


# __________________PostgreSQL
# __________________Gitlab Database for users, commentary, commit message, params
# __________________metrics disabled because we dont use Prometheus, and store on hardware local-path
postgresql:
  install: true
  metrics:
    enabled: false
  persistence:
    storageClass: local-path
    size: 15Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi


# __________________Redis
# __________________Cache memory for gitlab, use for fast acces. Such as online user, logs and tmp files
# __________________metrics disabled because we dont use Prometheus, only a master because low config
redis:
  install: true
  metrics:
    enabled: false
  master:
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi


# __________________Hearth of gitlab, for web interface and API REST
# __________________Puma correspond to workers that runs gitlab
gitlab:
  webservice:
    minReplicas: 1
    maxReplicas: 1
    puma:
      workers: 2
      threads:
        min: 2
        max: 4
    resources:
      requests:
        cpu: 300m
        memory: 1500Mi
      limits:
        cpu: 2000m
        memory: 2500Mi


# __________________Gitaly
# __________________Service that handle repository physical storage. Give acces to commands git and store all git logs.
  gitaly:
    persistence:
      storageClass: local-path
      size: 20Gi
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
  
# __________________GitLab Shell
# __________________Use for SSH entry point to gitlab.
  gitlab-shell:
    minReplicas: 1
    maxReplicas: 1
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi


# __________________Sidekiq
# __________________Asynchronous job processor, handle all background work such as notifications email, cleaning all artefacts, stats about repository, etc
  sidekiq:
    minReplicas: 1
    maxReplicas: 1
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi


# __________________Migrations
# __________________its not a service so it is launch only one time
# __________________Create all PostreSQL data base: tables, index and links
# __________________Create root user with initial password
# __________________Set-up default params
  migrations:
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi


# __________________Gitlab Runner (disabled)
# __________________CI/CD job executor, not needed as ArgoCD handles deployments
gitlab-runner:
  install: false

# __________________Prometheus monitoring (disabled)
# __________________Metrics scraping and alerting system, disabled to save resources
prometheus:
  install: false

# __________________Grafana (disabled)
# __________________Metrics visualization dashboard, disabled as Prometheus is disabled
grafana:
  install: false

# __________________Minio (disabled)
# __________________S3-compatible object storage for artifacts and LFS, using local-path storage instead
minio:
  install: false

# __________________Container Registry (disabled)
# __________________Docker image registry, not needed as ArgoCD pulls from an external registry
registry:
  enabled: false

# __________________Nginx Ingress (disabled, using traefik)
# __________________Default ingress controller bundled with GitLab, replaced by traefik already present in k3s
nginx-ingress:
  enabled: false

# __________________Certmanager (disabled, no HTTPS for local)
# __________________Automatic TLS certificate manager, not needed as HTTPS is disabled for local use
certmanager:
  enabled: false

# __________________Certmanager Issuer (disabled, no HTTPS for local)
# __________________Defines the certificate authority used by certmanager, dummy email required by chart even when disabled
certmanager-issuer:
  enabled: false
  email: admin@gitlab.local

# __________________Gitlab Pages (disabled)
# __________________Static site hosting from gitlab repos, not needed for this ArgoCD setup
gitlab-pages:
  enabled: false

# __________________KAS - Kubernetes Agent Server (disabled)
# __________________Agent for direct Kubernetes cluster integration with GitLab, not needed as ArgoCD manages the cluster
gitlab-kas:
  enabled: false

# __________________Praefect (disabled)
# __________________High availability proxy for Gitaly, not needed on a single local node
praefect:
  enabled: false
