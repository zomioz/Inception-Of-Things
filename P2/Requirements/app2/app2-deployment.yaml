apiVersion: apps/v1
kind: Deployment
metadata:
  name: app2
  labels:
    app: app2
spec:
  replicas: 3
  selector:
    matchLabels:
      app: app2
  template:
    metadata:
      labels:
        app: app2
    spec:
      volumes:
      - name: html-app2
        emptyDir: {}
      initContainers:
      - name: init-html-app2
        image: busybox:1.36
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        command:
        - sh
        - -c
        - |
          cat > /html/index.html <<EOF
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8"/>
            <title>App 2</title>
            <style>
              body{font-family:Arial,Helvetica,sans-serif;background:#222;color:#fff}
              .kube{background:#e63946;padding:20px;text-align:center}
              .box{max-width:800px;margin:20px auto;background:#444;padding:20px;border-radius:6px}
              .meta{font-size:0.9em;color:#ddd}
            </style>
          </head>
          <body>
            <div class="kube"><h1>Kubernetes</h1></div>
            <div class="box">
              <h2>Hello from app2</h2>
              <p class="meta">pod: $POD_NAME<br/>node: $NODE_NAME</p>
            </div>
          </body>
          </html>
          EOF
        volumeMounts:
        - name: html-app2
          mountPath: /html
      containers:
      - name: httpd
        image: httpd:2.4-alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: html-app2
          mountPath: /usr/local/apache2/htdocs
